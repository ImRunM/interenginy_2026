<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Marcador - Concurs ESEIAAT</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #007DC2;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative; /* Necessari pel posicionament absolut del logo */
        }

        /* ----- LOGO PRINCIPAL A DALT A L'ESQUERRA ----- */
        .main-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            max-height: 120px; /* Una mica més petit per a la cantonada */
            object-fit: contain;
        }

        /* ----- CAPÇALERA SENSE LOGO ----- */
        .header-container {
            width: 100%;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            margin: 0;
        }

        /* Contenidor de les targetes dels equips */
        .container {
            display: flex;
            gap: 3rem;
            width: 95%;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        /* Targeta de cada equip */
        .team-card {
            background-color: #ffffff;
            color: #333;
            padding: 2.5rem;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        /* Nom de l'equip (editable) */
        .team-name {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #007DC2;
            border-bottom: 2px dashed transparent;
            cursor: text;
        }
        
        .team-name:hover, .team-name:focus {
            border-bottom: 2px dashed #ccc;
            outline: none;
        }

        /* Puntuació */
        .score {
            font-size: 7rem;
            font-weight: bold;
            margin-bottom: 1rem;
            font-family: monospace; 
        }

        /* Botons equips (+1 i -1 per correccions) */
        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .btn-score {
            flex: 1;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .btn-score:active {
            transform: scale(0.95);
        }
        
        .btn-score:hover {
            filter: brightness(1.1);
        }

        .btn-add { background-color: #28a745; color: white; }
        .btn-sub { background-color: #6c757d; color: white; font-size: 1.2rem;}

        /* ----- ZONA INFERIOR: PATROCINADORS I CRONÒMETRE ----- */
        .bottom-section {
            display: flex;
            justify-content: center; 
            align-items: center;
            gap: 4rem; 
            width: 95%;
            max-width: 1200px;
            margin-top: 1rem;
        }

        /* Secció del Temporitzador (A l'esquerra) */
        .timer-container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 1.5rem 3rem;
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
        }

        .timer-display {
            font-size: 5rem;
            font-family: monospace;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: color 0.1s ease; 
            font-variant-numeric: tabular-nums; 
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-timer {
            background-color: #f8f9fa;
            color: #007DC2;
            padding: 10px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .btn-timer:active {
            transform: scale(0.95);
        }

        /* Secció de Patrocinadors (Ara a la dreta) */
        .sponsors-container {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        .sponsors-title {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffcc00; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        .sponsors-logos {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .sponsor-img {
            max-height: 120px;
            max-width: 200px;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img src="logo_eseiaat_blanc.png" alt="Logo Principal" class="main-logo" onerror="this.style.display='none'">

    <div class="header-container">
        <h1>Inter-Enginy Challenge 2026</h1>
    </div>

    <div class="container" id="teams-container">
        </div>

    <div class="bottom-section">
        
        <div class="timer-container">
            <div class="timer-display" id="timer-display">00:30.000</div>
            <div class="timer-controls">
                <button class="btn-timer" onclick="startTimer()">▶ Inicia</button>
                <button class="btn-timer" onclick="pauseTimer()">⏸ Pausa</button>
                <button class="btn-timer" onclick="resetTimer()">🔄 Reinicia</button>
            </div>
        </div>

        <div class="sponsors-container">
            <div class="sponsors-title">Patrocinadors:</div>
            <div class="sponsors-logos">
                <img src="logo_eic_negre.jpg" alt="Patrocinador 1" class="sponsor-img" onerror="this.style.display='none'">
            </div>
        </div>

    </div>

    <script>
        // --- LÒGICA DELS EQUIPS ---
        const numEquips = 2; 
        const puntsEncert = 1;
        
        let equips = [];

        for (let i = 0; i < numEquips; i++) {
            equips.push({ id: i, name: `Equip ${i + 1}`, score: 0 });
        }

        function dibuixarMarcador() {
            const container = document.getElementById('teams-container');
            container.innerHTML = ''; 

            equips.forEach((equip, index) => {
                const card = document.createElement('div');
                card.className = 'team-card';
                card.innerHTML = `
                    <div class="team-name" contenteditable="true" title="Fes clic per canviar el nom">${equip.name}</div>
                    <div class="score" id="score-${index}">0</div>
                    <div class="buttons">
                        <button class="btn-score btn-sub" onclick="actualitzarPunts(${index}, -${puntsEncert})" title="Restar 1 punt (Correcció)">-1</button>
                        <button class="btn-score btn-add" onclick="actualitzarPunts(${index}, ${puntsEncert})">+${puntsEncert}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function actualitzarPunts(index, canvi) {
            equips[index].score += canvi;
            
            if(equips[index].score < 0) equips[index].score = 0; 
            
            let puntsMostrar = equips[index].score;
            document.getElementById(`score-${index}`).innerText = puntsMostrar;
        }


        // --- LÒGICA DEL TEMPORITZADOR ---
        let tempsRestantMs = 30000; 
        let timerInterval = null;
        let tempsInici = 0;
        let tempsGuardat = 30000; 

        function actualitzarDisplayTemporitzador() {
            if (tempsRestantMs < 0) tempsRestantMs = 0;

            let minuts = Math.floor(tempsRestantMs / 60000);
            let segons = Math.floor((tempsRestantMs % 60000) / 1000);
            let milisegons = Math.floor(tempsRestantMs % 1000);
            
            let strMinuts = minuts < 10 ? "0" + minuts : minuts;
            let strSegons = segons < 10 ? "0" + segons : segons;
            let strMilisegons = milisegons < 10 ? "00" + milisegons : (milisegons < 100 ? "0" + milisegons : milisegons);
            
            let formatTemps = `${strMinuts}:${strSegons}.${strMilisegons}`;
            
            const display = document.getElementById('timer-display');
            display.innerText = formatTemps;

            if (tempsRestantMs <= 10000 && tempsRestantMs > 0) {
                display.style.color = '#ff4d4d'; 
            } else if (tempsRestantMs <= 20000 && tempsRestantMs > 10000) {
                display.style.color = '#ffcc00'; 
            } else if (tempsRestantMs === 0) {
                display.style.color = '#ff4d4d'; 
            } else {
                display.style.color = 'white'; 
            }
        }

        function startTimer() {
            if (timerInterval) return; 
            
            tempsInici = Date.now();
            
            timerInterval = setInterval(() => {
                let tempsPassat = Date.now() - tempsInici;
                tempsRestantMs = tempsGuardat - tempsPassat;

                if (tempsRestantMs <= 0) {
                    tempsRestantMs = 0;
                    pauseTimer(); 
                }
                
                actualitzarDisplayTemporitzador();
            }, 10); 
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            tempsGuardat = tempsRestantMs; 
        }

        function resetTimer() {
            pauseTimer();
            tempsRestantMs = 30000; 
            tempsGuardat = 30000;
            actualitzarDisplayTemporitzador();
        }

        // --- INICIALITZACIÓ ---
        dibuixarMarcador();
        actualitzarDisplayTemporitzador();
    </script>

</body>
</html>
